<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uv Media - Premium Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#000,#111,#1a1a1a);
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:rgba(255,215,0,0.05);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(255,215,0,0.2);
}

.logo{
font-size:28px;
font-weight:700;
background:linear-gradient(45deg,gold,#ffcc00);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.cart{
background:gold;
color:black;
padding:8px 18px;
border-radius:30px;
font-weight:600;
cursor:pointer;
}

.container{
padding:60px 8%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:40px;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:20px;
padding:25px;
backdrop-filter:blur(20px);
border:1px solid rgba(255,215,0,0.15);
transition:0.4s ease;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 20px 40px rgba(255,215,0,0.3);
}

.card img{
width:100%;
border-radius:15px;
margin-bottom:20px;
}

.card h2{
font-size:22px;
margin-bottom:10px;
color:gold;
}

.card p{
font-size:14px;
color:#ccc;
margin-bottom:15px;
}

.price{
font-size:20px;
color:#00ff88;
font-weight:600;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,gold,#ffcc00);
color:black;
font-weight:600;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px gold;
}
</style>
</head>

<body>

<header>
<div class="logo">Uv Media</div>

<!-- ✅ STEP 1 ADDED -->
<div class="cart" onclick="goToCheckout()">
Cart: <span id="cart-count">0</span>
</div>

</header>

<section class="container">

<div class="card">
<img src="1000060053.jpg" alt="">
<h2>TRIGGR NeoPods X – Electric Lime Edition</h2>
<p>Ultra bass, gaming mode & HD calling with bold premium design.</p>
<div class="price">₹2,499</div>
<button onclick="addToCart(2499)">Add to Cart</button>
</div>

<div class="card">
<img src="1000060054.jpg" alt="">
<h2>TRIGGR Phantom X – Limited Warrior Edition</h2>
<p>Luxury metallic finish, 40H battery & deep surround sound.</p>
<div class="price">₹3,999</div>
<button onclick="addToCart(3999)">Add to Cart</button>
</div>

</section>

<script>
let count = 0;
let total = 0;

function addToCart(price){
count++;
total += price;

document.getElementById("cart-count").innerText = count;
}

/* ✅ STEP 2 ADDED */
function goToCheckout(){
if(count === 0){
alert("Your cart is empty!");
}else{
window.location.href = "checkout.html?total=" + total;
}
}
</script>

</body>
</html>
